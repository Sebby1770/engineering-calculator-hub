name: EngineeringCalculatorHubMac
options:
  bundleIdPrefix: com.sebastianforbes
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "2650"
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SUPPORTED_PLATFORMS: macosx
    SWIFT_VERSION: "6.0"
targets:
  EngineeringCalculatorHubMac:
    type: application
    platform: macOS
    sources:
      - path: EngineeringCalculatorHub
    settings:
      base:
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Engineering Calculator Hub
        PRODUCT_BUNDLE_IDENTIFIER: com.sebastianforbes.engineeringcalculatorhub.mac
        SUPPORTED_PLATFORMS: macosx
        SWIFT_VERSION: "6.0"
schemes:
  EngineeringCalculatorHubMac:
    build:
      targets:
        EngineeringCalculatorHubMac: all
    run:
      config: Debug
    archive:
      config: Release
